<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💗 Lightning Access Pass</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(to bottom right, #ffd6e7, #ffeef5);
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 650px;
            margin: 60px auto;
            background: #fff0f6;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(255, 105, 180, 0.2);
            border: 2px solid #ffc2da;
        }

        h1 {
            margin-top: 0;
            color: #d63384;
            text-align: center;
        }

        p {
            text-align: center;
            color: #555;
        }

        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: bold;
            color: #d63384;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffc2da;
            border-radius: 12px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #ff69b4;
        }

        button {
            width: 100%;
            margin-top: 18px;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #ff69b4;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #e0559e;
        }

        .card {
            margin-top: 25px;
            padding: 18px;
            background: white;
            border-radius: 16px;
            border: 2px solid #ffd6e7;
            text-align: center;
        }

        .hidden {
            display: none;
        }

        #qrImage {
            margin-top: 15px;
            max-width: 220px;
            border-radius: 12px;
            border: 2px solid #ffc2da;
            padding: 6px;
            background: white;
        }

        #error {
            color: #c62828;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }

        .heart {
            text-align: center;
            font-size: 22px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="heart">💖✨💗</div>

        <h1>Lightning Access Pass</h1>
        <p>Enter your student ID to get your cute QR 💕</p>

        <label>Student ID</label>
        <input type="text" id="sid" placeholder="student1, student2, student3">

        <button onclick="generatePass()">Generate My QR 💗</button>

        <div id="error"></div>

        <div id="studentCard" class="card hidden">
            <h2>Student Info 🎓</h2>
            <p><strong>ID:</strong> <span id="studentId"></span></p>
            <p><strong>Name:</strong> <span id="studentName"></span></p>
            <p><strong>Major:</strong> <span id="studentMajor"></span></p>
            <p><strong>Access:</strong> <span id="studentAccess"></span></p>

            <img id="qrImage" alt="QR Code">
        </div>

    </div>

    <script>
        async function generatePass() {
            const sid = document.getElementById("sid").value.trim();
            const errorBox = document.getElementById("error");
            const studentCard = document.getElementById("studentCard");
            const qrImage = document.getElementById("qrImage");

            errorBox.textContent = "";
            studentCard.classList.add("hidden");
            qrImage.removeAttribute("src");

            if (!sid) {
                errorBox.textContent = "Enter a student ID 💗";
                return;
            }

            try {
                const response = await fetch(`/api/student/${sid}`);

                if (!response.ok) {
                    const message = await response.text();
                    errorBox.textContent = message;
                    return;
                }

                const student = await response.json();

                document.getElementById("studentId").textContent = student.id;
                document.getElementById("studentName").textContent = student.name;
                document.getElementById("studentMajor").textContent = student.major;
                document.getElementById("studentAccess").textContent = student.accessLevel;

                qrImage.src = `/generate-id?sid=${encodeURIComponent(sid)}`;
                studentCard.classList.remove("hidden");

            } catch (error) {
                errorBox.textContent = "Something went wrong 😭";
            }
        }
    </script>
</body>
</html>
