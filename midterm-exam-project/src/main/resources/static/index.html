<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehman SmartID Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6 border border-slate-100">
        <div class="text-center">
            <h1 class="text-2xl font-bold text-slate-800">Lehman SmartID</h1>
            <p class="text-slate-500 text-sm">Enter your ID to generate your digital pass</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Student ID</label>
                <input type="text" id="sid" placeholder="e.g. 12345" 
                       class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none">
            </div>
            
            <button onclick="generatePass()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition-colors">
                Generate Digital ID
            </button>
        </div>

        <div id="result" class="hidden flex flex-col items-center space-y-4 pt-4 border-t border-slate-100">
            <p class="font-medium text-slate-700" id="studentName"></p>
            <img id="qrCode" src="" alt="QR Code" class="w-48 h-48 rounded-lg shadow-inner bg-slate-50">
            <p class="text-xs text-slate-400">Scan at any campus resource terminal</p>
        </div>
    </div>

    <script>
        async function generatePass() {
            const sid = document.getElementById('sid').value;
            const resultDiv = document.getElementById('result');
            const nameEl = document.getElementById('studentName');
            const qrImg = document.getElementById('qrCode');


            if (!sid) return;

            try {
                // Fetch student info from our API
                const response = await fetch(`/api/student/${sid}`);
                if (response.ok) {
                    const student = await response.json();
                    nameEl.textContent = `Student: ${student.name}`;
                    // Point to our dynamic QR endpoint
                    qrImg.src = `/generate-id?sid=${sid}`;
                    resultDiv.classList.remove('hidden');
                } else {
                    alert(response.status + ': Student not found!');
                    resultDiv.classList.add('hidden');
                }

                    return;
                }
                throw new Error(`HTTP ${response.status}`);
            }

            const student = await response.json();

        }
    </script>
</body>
</html>
