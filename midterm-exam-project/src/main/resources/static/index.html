<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lehman Lightning QR Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            text-align: center;
        }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .lightning { color: #ffd700; font-size: 0.8em; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            text-align: left;
        }
        .btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .qr-container { margin: 20px 0; }
        .qr-img { max-width: 250px; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        @media (max-width: 768px) {
            .container { padding: 20px; margin: 10px; }
            h1 { font-size: 2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Lehman <span class="lightning">Lightning</span></h1>
        <p class="subtitle">Student QR Code Portal</p>
        
        <div class="card">
            <h3>🔍 Get Student Info</h3>
            <input type="text" id="studentId" placeholder="Enter Student ID (001, 002, etc.)" style="padding:10px; width:200px; border-radius:5px; border:1px solid #ddd; margin:10px;">
            <button class="btn" onclick="getStudent()">Get Profile</button>
            <div id="studentInfo"></div>
        </div>
        
        <div class="card">
            <h3>🎫 Generate QR ID</h3>
            <input type="text" id="qrSid" placeholder="Student ID" style="padding:10px; width:200px; border-radius:5px; border:1px solid #ddd; margin:10px;">
            <button class="btn" onclick="generateQR()">Generate QR</button>
            <div class="qr-container" id="qrContainer" style="display:none;">
                <img id="qrImage" class="qr-img" alt="QR Code">
                <p>Scan to access student data!</p>
            </div>
        </div>
    </div>

    <script>
        async function getStudent() {
            const id = document.getElementById('studentId').value;
            if (!id) return alert('Please enter a Student ID');
            
            try {
                const response = await fetch(`/api/student/${id}`);
                const data = await response.json();
                document.getElementById('studentInfo').innerHTML = `
                    <pre style="background:#f0f0f0;padding:15px;border-radius:5px;margin-top:10px;">
${JSON.stringify(data, null, 2)}
                    </pre>
                `;
            } catch (e) {
                document.getElementById('studentInfo').innerHTML = '<p style="color:red;">Student not found!</p>';
            }
        }
        
        function generateQR() {
            const sid = document.getElementById('qrSid').value;
            if (!sid) return alert('Please enter a Student ID');
            
            document.getElementById('qrContainer').style.display = 'block';
            document.getElementById('qrImage').src = `/generate-id?sid=${sid}`;
        }
    </script>
</body>
</html>
