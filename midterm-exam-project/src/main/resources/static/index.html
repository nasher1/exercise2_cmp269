<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightning Access Pass</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-yellow-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg p-8 space-y-6 border border-yellow-200">
    <div class="text-center">
      <h1 class="text-2xl font-bold text-yellow-700">Lightning Access Pass</h1>
      <p class="text-slate-500 text-sm">CMP 269 Student ID Generator</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">Student ID</label>
        <input
          type="text"
          id="sid"
          placeholder="Try student1, student2, or student3"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-yellow-500 focus:border-transparent outline-none"
        />
      </div>

      <button
        onclick="generatePass()"
        class="w-full bg-yellow-600 hover:bg-yellow-700 text-white font-semibold py-2 rounded-lg transition-colors"
      >
        Generate My QR Pass
      </button>
    </div>

    <div id="result" class="hidden flex flex-col items-center space-y-4 pt-4 border-t border-slate-100">
      <p class="font-medium text-slate-700" id="studentName"></p>
      <p class="text-sm text-slate-500" id="studentMajor"></p>
      <img id="qrCode" src="" alt="QR Code" class="w-48 h-48 rounded-lg shadow-inner bg-slate-50">
      <p class="text-xs text-slate-400">Campus verification code</p>
    </div>
  </div>

  <script>
    async function generatePass() {
      const sid = document.getElementById("sid").value.trim();
      const resultDiv = document.getElementById("result");
      const nameEl = document.getElementById("studentName");
      const majorEl = document.getElementById("studentMajor");
      const qrImg = document.getElementById("qrCode");

      if (!sid) {
        alert("Please enter a student ID.");
        return;
      }

      try {
        const response = await fetch(`/api/student/${sid}`);

        if (!response.ok) {
          alert("Student not found. Try student1, student2, or student3.");
          resultDiv.classList.add("hidden");
          return;
        }

        const student = await response.json();

        nameEl.textContent = `Name: ${student.name}`;
        majorEl.textContent = `Major: ${student.major}`;
        qrImg.src = `/generate-id?sid=${sid}`;
        resultDiv.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        alert("Something went wrong while loading the student data.");
      }
    }
  </script>
</body>
</html>
